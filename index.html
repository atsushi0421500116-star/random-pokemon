<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランダムポケモン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <span class="logo">&#x25CF; Pokédex</span>
      <span class="counter" id="counter">#000</span>
    </header>

    <div class="card" id="card">
      <div class="card-bg" id="card-bg"></div>

      <div class="sprite-wrap">
        <img id="sprite" src="" alt="" />
        <div class="spinner" id="spinner"></div>
      </div>

      <div class="info">
        <div class="name-row">
          <h1 id="name">——</h1>
          <span id="name-ja" class="name-ja">——</span>
        </div>

        <div class="types" id="types"></div>

        <div class="stats" id="stats"></div>

        <div class="meta">
          <div class="meta-item">
            <span class="meta-label">高さ</span>
            <span id="height" class="meta-val">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">重さ</span>
            <span id="weight" class="meta-val">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">特性</span>
            <span id="ability" class="meta-val">—</span>
          </div>
        </div>
      </div>
    </div>

    <button class="roll-btn" id="roll-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/>
        <polyline points="23 20 23 14 17 14"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      つぎのポケモン
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
